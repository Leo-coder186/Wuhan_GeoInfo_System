<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 视口设置，确保在各种屏幕上正确缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>城市地理信息监控中心</title>
    <meta name="description" content="基于 Vue 3 + ECharts + 高德地图的城市地理信息可视化大屏" />
    <!-- 引入 Google 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!--
      ★ 引入高德地图 JS API 2.0 ★
    -->
    <script type="text/javascript">
      window._AMapSecurityConfig = {
        securityJsCode: '%VITE_AMAP_SECURITY_CODE%',
      }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=%VITE_AMAP_KEY%&plugin=AMap.Scale,AMap.ToolBar,AMap.InfoWindow"></script>
  </head>
  <body>
    <!-- Vue 3 应用的挂载点 -->
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
